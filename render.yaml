services:
  - type: web
    name: llm-regression-suite-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.4"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
    plan: free
